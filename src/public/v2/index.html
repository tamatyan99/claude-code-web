<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Claude Code Web</title>
    <meta name="theme-color" content="#161b22">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-left">
                <h1 class="header-title">Claude Code</h1>
                <span class="header-version">Chat</span>
            </div>
            <div class="header-right">
                <select id="modelSelect" class="model-select" title="Switch model">
                    <option value="sonnet">Sonnet</option>
                    <option value="opus">Opus</option>
                    <option value="haiku">Haiku</option>
                </select>
                <span class="status-dot" id="statusDot" title="Disconnected"></span>
            </div>
        </header>

        <!-- Usage Bar -->
        <div class="usage-bar" id="usageBar">
            <div class="usage-item usage-timer">
                <span class="usage-label">Session</span>
                <span class="usage-value" id="usageTimer">--:--</span>
            </div>
            <div class="usage-item usage-tokens">
                <span class="usage-label">Tokens</span>
                <div class="usage-progress-wrap">
                    <div class="usage-progress">
                        <div class="usage-progress-fill" id="usageProgressFill"></div>
                    </div>
                    <span class="usage-value" id="usageTokens">0</span>
                </div>
            </div>
            <div class="usage-item usage-cost">
                <span class="usage-label">Cost</span>
                <span class="usage-value" id="usageCost">$0.00</span>
            </div>
            <div class="usage-item usage-rate">
                <span class="usage-label">Rate</span>
                <span class="usage-value" id="usageRate">-- tok/min</span>
            </div>
        </div>

        <!-- Messages -->
        <main class="chat-messages" id="chatMessages">
            <div class="welcome-message" id="welcomeMessage">
                <h2>Claude Code</h2>
                <p>Send a message to start a conversation.</p>
                <p class="welcome-hint">Powered by Claude Agent SDK</p>
            </div>
        </main>

        <!-- Input -->
        <footer class="chat-input-bar">
            <div class="input-wrapper">
                <textarea id="chatInput" class="chat-input" placeholder="Message Claude..." rows="1" autofocus></textarea>
                <button id="sendBtn" class="send-btn" title="Send (Enter)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <div class="input-info">
                <span id="costDisplay">$0.00</span>
                <span id="statusText">Disconnected</span>
            </div>
        </footer>
    </div>

    <script src="chat.js"></script>
</body>
</html>

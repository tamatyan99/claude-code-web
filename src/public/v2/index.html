<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Web</title>
    <meta name="theme-color" content="#161b22">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- Mermaid for diagram rendering -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <link rel="stylesheet" href="/v2/chat.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar" aria-label="Session sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Claude Code</span>
                <button class="sidebar-new-btn" id="newChatBtn" title="New Chat (Ctrl+N)">+ New</button>
            </div>
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" id="tabSessions" data-tab="sessions">Sessions</button>
                <button class="sidebar-tab" id="tabFiles" data-tab="files">Files</button>
                <button class="sidebar-tab" id="tabGit" data-tab="git">Git</button>
            </div>
            <div id="sessionPanel" class="sidebar-panel active">
                <div class="session-list" id="sessionList"></div>
            </div>
            <div id="filePanel" class="sidebar-panel hidden">
                <div class="file-tree-toolbar">
                    <span class="file-tree-path" id="fileTreePath"></span>
                    <button class="file-refresh-btn" id="fileRefreshBtn" title="Refresh">↻</button>
                </div>
                <div class="file-tree" id="fileTree"></div>
            </div>
            <div id="gitPanel" class="sidebar-panel hidden">
                <div class="git-panel-content" id="gitPanelContent">
                    <div class="git-loading">Loading git status...</div>
                </div>
            </div>
            <!-- Usage Panel -->
            <div class="usage-panel" id="usagePanel">
                <div class="usage-panel-header" id="usagePanelToggle">
                    <span>Usage</span>
                    <span class="usage-panel-chevron" id="usagePanelChevron">&#9660;</span>
                </div>
                <div class="usage-panel-body" id="usagePanelBody">
                    <div class="usage-stat">
                        <span class="usage-stat-label">Session</span>
                        <span class="usage-stat-value" id="usageSessionTimer">--:--:--</span>
                    </div>
                    <div class="usage-stat">
                        <span class="usage-stat-label">Remaining</span>
                        <span class="usage-stat-value" id="usageRemaining">--:--</span>
                    </div>
                    <div class="usage-bar-container">
                        <div class="usage-bar">
                            <div class="usage-bar-fill usage-bar-input" id="usageBarInput" style="width:0%"></div>
                            <div class="usage-bar-fill usage-bar-output" id="usageBarOutput" style="width:0%"></div>
                            <div class="usage-bar-fill usage-bar-cache" id="usageBarCache" style="width:0%"></div>
                        </div>
                        <div class="usage-bar-legend">
                            <span class="usage-legend-item"><span class="usage-dot" style="background:var(--accent)"></span>In</span>
                            <span class="usage-legend-item"><span class="usage-dot" style="background:var(--success)"></span>Out</span>
                            <span class="usage-legend-item"><span class="usage-dot" style="background:var(--purple)"></span>Cache</span>
                        </div>
                    </div>
                    <div class="usage-stat">
                        <span class="usage-stat-label">Tokens</span>
                        <span class="usage-stat-value" id="usageTokens">0</span>
                    </div>
                    <div class="usage-stat">
                        <span class="usage-stat-label">Cost</span>
                        <span class="usage-stat-value" id="usageCost">$0.00</span>
                    </div>
                    <div class="usage-stat">
                        <span class="usage-stat-label">Burn Rate</span>
                        <span class="usage-stat-value" id="usageBurnRate">-- tok/min</span>
                    </div>
                    <div class="usage-stat">
                        <span class="usage-stat-label">Requests</span>
                        <span class="usage-stat-value" id="usageRequests">0</span>
                    </div>
                    <div class="usage-depletion" id="usageDepletion"></div>
                </div>
            </div>
        </aside>

        <!-- Sidebar overlay for mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Main Panel -->
        <div class="main-panel">
            <!-- Header -->
            <header class="chat-header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar" aria-label="Toggle sidebar" aria-expanded="true">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="6" x2="21" y2="6"/>
                            <line x1="3" y1="12" x2="21" y2="12"/>
                            <line x1="3" y1="18" x2="21" y2="18"/>
                        </svg>
                    </button>
                    <h1 class="header-title">Claude Code</h1>
                    <span class="header-version">Chat</span>
                    <span class="header-workdir" id="workingDirDisplay" title="Working directory"></span>
                </div>
                <div class="header-right">
                    <!-- Model values are short names passed through to the CLI via --model flag -->
                    <select id="modelSelect" class="model-select" title="Switch model">
                        <option value="sonnet">Sonnet</option>
                        <option value="opus">Opus</option>
                        <option value="haiku">Haiku</option>
                    </select>
                    <select id="permissionSelect" class="permission-select" title="Permission mode">
                        <option value="safe">Safe Mode</option>
                        <option value="bypass">Bypass Permissions</option>
                    </select>
                    <button class="theme-toggle-btn" id="themeToggle" title="Toggle light/dark theme">☀</button>
                    <span class="status-dot" id="statusDot" title="Disconnected" role="status" aria-live="polite" aria-label="Connection status: disconnected"></span>
                </div>
            </header>

            <!-- Session tabs bar -->
            <nav class="session-tabs" id="sessionTabs" aria-label="Session tabs"></nav>

            <!-- Messages -->
            <main class="chat-messages" id="chatMessages" aria-live="polite" aria-label="Chat messages">
                <!-- Session panels are dynamically added here by chat.js -->
            </main>

            <!-- Input -->
            <footer class="chat-input-bar">
                <div class="input-wrapper">
                    <textarea id="chatInput" class="chat-input" placeholder="Message Claude..." rows="1" autofocus aria-label="Message input"></textarea>
                    <button id="sendBtn" class="send-btn" title="Send (Enter)" aria-label="Send message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                    <button id="stopBtn" class="stop-btn hidden" title="Stop (Escape)" aria-label="Stop processing">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
                <div class="input-info">
                    <span id="costDisplay">$0.00</span>
                    <span id="statusText">Disconnected</span>
                </div>
            </footer>
        </div>
    </div>

    <!-- Folder Picker Modal -->
    <div class="folder-modal-overlay hidden" id="folderModalOverlay"></div>
    <div class="folder-modal hidden" id="folderModal">
        <div class="folder-modal-header">
            <span class="folder-modal-title">Select Working Directory</span>
            <button class="folder-modal-close" id="folderModalClose">&times;</button>
        </div>
        <div class="folder-breadcrumb" id="folderBreadcrumb"></div>
        <div class="folder-list" id="folderList"></div>
        <div class="folder-actions">
            <button class="folder-cancel-btn" id="folderCancelBtn">Cancel</button>
            <button class="folder-select-btn" id="folderSelectBtn">Select This Folder</button>
        </div>
    </div>

    <!-- File Viewer Modal -->
    <div class="modal-overlay hidden" id="fileViewerOverlay"></div>
    <div class="modal file-viewer-modal hidden" id="fileViewerModal">
        <div class="modal-header">
            <code class="file-viewer-path" id="fileViewerPath"></code>
            <button class="modal-close-btn" id="fileViewerClose">&times;</button>
        </div>
        <pre class="file-viewer-content" id="fileViewerContent"><code id="fileViewerCode"></code></pre>
    </div>

    <script src="/v2/chat.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .catch(err => console.error('SW registration failed:', err));
        }
    </script>
</body>
</html>
